name: CI
run-name: CI ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: |
          npm run check
          npm run build
          npm run check:adapters
          npm run check:tokens
          npm run check:artifacts
          npm run check:artifact-fixtures
          npm pack --dry-run

      - name: Read version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        if: github.event_name == 'push'
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  create_tag:
    needs: validate
    if: github.event_name == 'push' && needs.validate.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create and push tag
        run: |
          git tag ${{ needs.validate.outputs.version_tag }}
          git push origin ${{ needs.validate.outputs.version_tag }}

  publish:
    needs: create_tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rollback tag on failure
        if: failure()
        run: |
          git push --delete origin ${{ needs.validate.outputs.version_tag }} 2>/dev/null || true
          git tag -d ${{ needs.validate.outputs.version_tag }} 2>/dev/null || true

  create_release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.version_tag }}
          generate_release_notes: true
